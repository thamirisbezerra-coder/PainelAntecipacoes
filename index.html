<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Amostras - Doremus</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Maps para carregar o React, Ícones e Gráficos no navegador -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.2.0",
        "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Estilização suave para a barra de rolagem */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Script principal em React -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Calendar, Clock, CheckCircle2, AlertCircle, Mail, Search, 
      X, Send, Building2, Package, UserCircle, Copy, Filter, Layers, Trash2, BellRing, Loader2, RefreshCw, BarChart3, PieChart as PieChartIcon, Menu, ChevronLeft, ExternalLink
    } from 'lucide-react';
    
    import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, ResponsiveContainer, PieChart, Pie, Cell } from 'recharts';

    // =========================================================================
    // URL DO GOOGLE APPS SCRIPT
    // =========================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ7N3abnyhUZginfgjoA3_H1Ur5PGwSswNeXyt9R_X1zaudevD-5mmvrjny2ryAg/exec"; 

    const SEGMENTOS = [
      'CÁRNEOS', 'EXPORTACAO', 'FARMA', 'FOOD SERVICE', 'LACTEOS',
      'NUTRICAO ANIMAL', 'NUTRICAO ESPORTIVA', 'PANIFICACAO', 'SMB', 'SORVETES'
    ];

    const EMAILS_COPIA_FIXA = ['thamiris.bezerra@doremus.com.br', 'paula.novais@doremus.com.br'];

    const getToday = () => {
      const d = new Date();
      d.setHours(0,0,0,0);
      return d;
    };

    function App() {
      const [orders, setOrders] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [activeTab, setActiveTab] = useState('Todos');
      const [selectedSegment, setSelectedSegment] = useState('Todos');
      const [emailModalData, setEmailModalData] = useState(null);
      const [orderToDelete, setOrderToDelete] = useState(null);
      const [isCopied, setIsCopied] = useState(false);
      
      const [showDailyDigest, setShowDailyDigest] = useState(false);
      const [hasSeenDigestThisSession, setHasSeenDigestThisSession] = useState(false);
      
      // Estado de controle da Barra Lateral
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);

      // --- COMUNICAÇÃO COM O GOOGLE SHEETS ---
      const fetchOrders = async () => {
        setIsLoading(true);
        try {
          if(SCRIPT_URL === "SUA_URL_AQUI") {
            setIsLoading(false);
            return;
          }
          const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
          const data = await response.json();
          
          data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setOrders(data);

          const pendingFeedbacks = data.filter(o => isEmailDue(o));
          if (pendingFeedbacks.length > 0 && !hasSeenDigestThisSession) {
            setShowDailyDigest(true);
            setHasSeenDigestThisSession(true);
          }
        } catch (error) {
          console.error("Erro ao ler da planilha:", error);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => { fetchOrders(); }, []);

      const getDaysDifference = (targetDateStr) => {
        if (!targetDateStr) return 0;
        const targetDate = new Date(`${targetDateStr}T00:00:00`);
        const diffTime = targetDate - getToday();
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      };

      const isEmailDue = (order) => {
        if (order.status === 'Finalizado' || order.status === 'Faturado') return false;
        if (!order.dataTeste) return false;
        const daysSinceTest = getDaysDifference(order.dataTeste) * -1;
        return daysSinceTest >= 1 && order.status === 'Enviado';
      };

      const getStatusBadge = (order) => {
        if (order.status === 'Enviado') return <span className="px-3 py-1 bg-emerald-100 text-emerald-700 text-[11px] font-bold rounded-full flex items-center gap-1 w-max border border-emerald-200 shadow-sm"><CheckCircle2 size={12}/> Enviado</span>;
        if (order.status === 'Finalizado') return <span className="px-3 py-1 bg-slate-100 text-slate-600 text-[11px] font-bold rounded-full w-max border border-slate-200 shadow-sm">Finalizado</span>;
        if (order.status === 'Faturado') return <span className="px-3 py-1 bg-blue-100 text-blue-700 text-[11px] font-bold rounded-full w-max border border-blue-200 shadow-sm">Faturado</span>;

        const daysToNeed = getDaysDifference(order.dataNecessidade);
        if (daysToNeed < 0) return <span className="px-3 py-1 bg-rose-100 text-rose-700 text-[11px] font-bold rounded-full flex items-center gap-1 w-max border border-rose-200 shadow-sm"><AlertCircle size={12}/> Atrasado</span>;
        if (daysToNeed <= 3) return <span className="px-3 py-1 bg-amber-100 text-amber-700 text-[11px] font-bold rounded-full flex items-center gap-1 w-max border border-amber-200 shadow-sm"><Clock size={12}/> Urgente</span>;
        
        return <span className="px-3 py-1 bg-sky-100 text-sky-700 text-[11px] font-bold rounded-full flex items-center gap-1 w-max border border-sky-200 shadow-sm"><Calendar size={12}/> No Prazo</span>;
      };

      const markAsSent = async (id) => {
        setIsLoading(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', id, status: 'Enviado' }) });
        fetchOrders();
      };

      const markAsFinished = async (id) => {
        setIsLoading(true);
        setEmailModalData(null);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', id, status: 'Finalizado' }) });
        fetchOrders();
      };

      const handleDeleteOrder = async (id) => {
        setIsLoading(true);
        setOrderToDelete(null);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteOrder', id }) });
        fetchOrders();
      };

      // NOVO: Função para disparar abertura automática direto no Gmail Web
      const handleOpenGmail = (order) => {
        const to = order.emailVendedor || '';
        const ccList = [
          ...EMAILS_COPIA_FIXA,
          order.emailGerente,
          order.emailDiretor,
          order.emailAtendente
        ].filter(Boolean).join(',');
        
        const subject = `Acompanhamento de Teste - Pedido ${order.pedido} - ${order.razaoSocial}`;
        
        const body = `Prezado(a) ${order.vendedor},

Esperamos que este e-mail o(a) encontre bem.

Entramos em contato referente à antecipação da amostra solicitada sob o Pedido ${order.pedido} para o cliente ${order.razaoSocial}.

Conforme nossos registros, a amostra do produto ${order.codigoProduto ? order.codigoProduto + ' - ' : ''}${order.produto} (Quantidade: ${order.quantidade}) tinha um teste agendado para a data de ${order.dataTeste ? order.dataTeste.split('-').reverse().join('/') : ''}.

Para garantir a eficácia das nossas soluções, solicitamos gentilmente um feedback detalhado sobre este teste. Informações essenciais incluem:

- O teste foi realizado conforme o previsto?
- Como foi a performance do nosso produto durante a aplicação?
- Houve aprovação técnica por parte do cliente?
- Quais são os próximos passos ou previsão para negócios decorrentes desta amostra?

Agradecemos antecipadamente pela sua colaboração. O seu retorno é fundamental para alinhamento com a gerência e diretoria.

Atenciosamente,

${order.atendente}
Setor de Amostras - Doremus`;

        // URL específica para abrir o Gmail no navegador (view=cm significa "compose mode")
        const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&cc=${encodeURIComponent(ccList)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        // Abre o Gmail em uma nova aba
        window.open(gmailUrl, '_blank');
      };

      // Filtros
      const filteredOrders = orders.filter(o => {
        const matchesSearch = o.razaoSocial?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              o.pedido?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              o.vendedor?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              (o.codigoProduto && o.codigoProduto.toLowerCase().includes(searchTerm.toLowerCase()));
        
        let matchesTab = true;
        if (activeTab === 'Pendentes') matchesTab = o.status === 'Pendente';
        if (activeTab === 'Aguardando Teste') matchesTab = o.status === 'Enviado' && !isEmailDue(o);
        if (activeTab === 'Feedbacks') matchesTab = isEmailDue(o);
        if (activeTab === 'Finalizados') matchesTab = o.status === 'Finalizado' || o.status === 'Faturado';
        
        const orderSegment = String(o.segmento || '').toUpperCase().trim();
        const matchesSegment = selectedSegment === 'Todos' || orderSegment === selectedSegment;

        return matchesSearch && matchesTab && matchesSegment;
      });

      const allSegments = ['Todos', ...SEGMENTOS];
      const ordersInSegment = selectedSegment === 'Todos' ? orders : orders.filter(o => String(o.segmento || '').toUpperCase().trim() === selectedSegment);
      
      const countPendentes = ordersInSegment.filter(o => o.status === 'Pendente').length;
      const countUrgentes = ordersInSegment.filter(o => o.status === 'Pendente' && getDaysDifference(o.dataNecessidade) <= 3).length;
      const countEnviados = ordersInSegment.filter(o => o.status === 'Enviado' && !isEmailDue(o)).length;
      const feedbacksPendentesData = ordersInSegment.filter(o => isEmailDue(o));
      const countFeedbacks = feedbacksPendentesData.length;

      // =========================================================================
      // DADOS PARA OS GRÁFICOS (Recharts)
      // =========================================================================
      const chartDataSegments = useMemo(() => {
        const counts = {};
        ordersInSegment.forEach(o => {
          if (o.status !== 'Finalizado' && o.status !== 'Faturado') {
            const seg = o.segmento || 'Outros';
            counts[seg] = (counts[seg] || 0) + 1;
          }
        });
        return Object.keys(counts).map(k => ({ name: k, total: counts[k] })).sort((a,b) => b.total - a.total).slice(0, 5); // Top 5
      }, [ordersInSegment]);

      const chartDataStatus = useMemo(() => {
        return [
          { name: 'Pendentes', value: countPendentes, color: '#f59e0b' },
          { name: 'Aguardando Teste', value: countEnviados, color: '#10b981' },
          { name: 'Feedbacks', value: countFeedbacks, color: '#8b5cf6' },
        ].filter(d => d.value > 0);
      }, [countPendentes, countEnviados, countFeedbacks]);

      return (
        <div className="min-h-screen flex bg-slate-50 font-sans text-slate-800">
          
          {/* OVERLAY DE LOADING */}
          {isLoading && (
            <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
              <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center border border-slate-100">
                <Loader2 size={40} className="text-blue-600 animate-spin mb-4" />
                <p className="text-sm font-bold text-slate-700">Sincronizando Dados...</p>
              </div>
            </div>
          )}

          {/* SIDEBAR (Menu Lateral) */}
          <aside className={`bg-slate-900 text-slate-300 flex flex-col fixed h-full z-20 shadow-xl transition-all duration-300 ${
            isSidebarOpen ? 'w-64 translate-x-0' : 'w-64 -translate-x-full'
          }`}>
            <div className="h-20 flex items-center justify-between px-5 border-b border-slate-800 bg-slate-950">
              <img src="https://i.postimg.cc/J0G8jfMQ/as-02-(2).png" alt="Logo" className="h-10 object-contain brightness-0 invert" />
              <button 
                onClick={() => setIsSidebarOpen(false)}
                className="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-800 transition-colors"
                title="Recolher menu"
              >
                <ChevronLeft size={20} />
              </button>
            </div>
            
            <div className="p-6 flex-1 flex flex-col gap-6 overflow-y-auto">
              <div>
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Painel Principal</p>
                <div className="bg-blue-600/10 text-blue-400 p-3 rounded-xl flex items-center gap-3 border border-blue-500/20">
                  <BarChart3 size={18} />
                  <span className="font-semibold text-sm">Dashboard</span>
                </div>
              </div>

              <div>
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Filtrar Segmento</p>
                <div className="space-y-1">
                  {allSegments.map(seg => (
                    <button 
                      key={seg}
                      onClick={() => setSelectedSegment(seg)}
                      className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all flex items-center justify-between ${
                        selectedSegment === seg 
                          ? 'bg-slate-800 text-white font-medium border border-slate-700 shadow-inner' 
                          : 'hover:bg-slate-800/50 hover:text-slate-200'
                      }`}
                    >
                      <span className="truncate">{seg}</span>
                      {selectedSegment === seg && <CheckCircle2 size={14} className="text-blue-400" />}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            
            <div className="p-4 border-t border-slate-800 text-center">
              <p className="text-[10px] text-slate-600">Sincronizado via Google Sheets</p>
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className={`flex-1 p-8 min-h-screen transition-all duration-300 ${
            isSidebarOpen ? 'ml-64' : 'ml-0'
          }`}>
            
            {/* HEADER SUPERIOR */}
            <div className="flex justify-between items-center mb-8">
              <div className="flex items-center gap-4">
                {!isSidebarOpen && (
                  <button 
                    onClick={() => setIsSidebarOpen(true)}
                    className="bg-white border border-slate-200 hover:border-blue-500 hover:text-blue-600 text-slate-600 p-2.5 rounded-xl shadow-sm transition-all"
                    title="Expandir menu"
                  >
                    <Menu size={20} />
                  </button>
                )}
                <div>
                  <h1 className="text-2xl font-bold text-slate-800 tracking-tight">Visão Geral</h1>
                  <p className="text-sm text-slate-500 mt-1">Gerencie antecipações e acompanhe os feedbacks pendentes.</p>
                </div>
              </div>
              
              <div className="flex gap-4 items-center">
                <div className="relative bg-white shadow-sm border border-slate-200 rounded-xl overflow-hidden flex items-center w-72 focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                  <div className="pl-3 text-slate-400"><Search size={16} /></div>
                  <input 
                    type="text" 
                    placeholder="Buscar pedido, cliente..." 
                    className="w-full pl-2 pr-4 py-2.5 text-sm focus:outline-none bg-transparent"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
                
                <button 
                  onClick={() => fetchOrders()}
                  className="bg-white border border-slate-200 hover:border-blue-500 hover:text-blue-600 text-slate-600 p-2.5 rounded-xl shadow-sm transition-all group"
                  title="Sincronizar Manualmente"
                >
                  <RefreshCw size={18} className={`group-hover:rotate-180 transition-transform duration-500 ${isLoading ? "animate-spin text-blue-500" : ""}`} />
                </button>
              </div>
            </div>

            {/* GRÁFICOS */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
              {/* Gráfico 1: Top Segmentos */}
              <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                <div className="flex items-center gap-2 mb-6">
                  <BarChart3 size={18} className="text-blue-500" />
                  <h3 className="text-sm font-bold text-slate-700">Top 5 Segmentos (Em Andamento)</h3>
                </div>
                <div className="flex-1 min-h-[200px]">
                  {chartDataSegments.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartDataSegments} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11, fill: '#64748b'}} />
                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 11, fill: '#64748b'}} allowDecimals={false} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}} />
                        <Bar dataKey="total" fill="#3b82f6" radius={[6, 6, 0, 0]} barSize={40} />
                      </BarChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="h-full flex items-center justify-center text-slate-400 text-sm">Nenhum dado ativo no momento.</div>
                  )}
                </div>
              </div>

              {/* Gráfico 2: Distribuição de Status */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                <div className="flex items-center gap-2 mb-2">
                  <PieChartIcon size={18} className="text-purple-500" />
                  <h3 className="text-sm font-bold text-slate-700">Saúde do Pipeline</h3>
                </div>
                <div className="flex-1 min-h-[200px] flex items-center justify-center relative">
                  {chartDataStatus.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie data={chartDataStatus} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={2} dataKey="value" stroke="none">
                          {chartDataStatus.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.color} />
                          ))}
                        </Pie>
                        <RechartsTooltip contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                      </PieChart>
                    </ResponsiveContainer>
                  ) : (
                    <p className="text-slate-400 text-sm">Sem dados pendentes.</p>
                  )}
                  {chartDataStatus.length > 0 && (
                    <div className="absolute flex flex-col items-center justify-center pointer-events-none">
                      <span className="text-2xl font-bold text-slate-800">{countPendentes + countEnviados + countFeedbacks}</span>
                      <span className="text-[10px] text-slate-400 uppercase tracking-wide">Total Ativos</span>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* MÉTRICAS */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
              <div onClick={() => setActiveTab('Pendentes')} className={`bg-white p-5 rounded-2xl shadow-sm border transition-all cursor-pointer group hover:-translate-y-1 ${activeTab === 'Pendentes' ? 'border-amber-400 ring-2 ring-amber-400/20' : 'border-slate-100 hover:border-slate-300'}`}>
                <div className="flex justify-between items-start mb-4">
                  <div className={`p-2.5 rounded-xl ${countUrgentes > 0 ? 'bg-rose-100 text-rose-600' : 'bg-amber-100 text-amber-600'}`}>
                    {countUrgentes > 0 ? <AlertCircle size={20} /> : <Package size={20} />}
                  </div>
                  <span className="text-3xl font-black text-slate-800">{countPendentes}</span>
                </div>
                <p className="text-sm font-semibold text-slate-600">Para Enviar</p>
                {countUrgentes > 0 && <p className="text-[11px] text-rose-600 mt-1 font-medium">{countUrgentes} atrasados/urgentes!</p>}
              </div>

              <div onClick={() => setActiveTab('Aguardando Teste')} className={`bg-white p-5 rounded-2xl shadow-sm border transition-all cursor-pointer group hover:-translate-y-1 ${activeTab === 'Aguardando Teste' ? 'border-emerald-400 ring-2 ring-emerald-400/20' : 'border-slate-100 hover:border-slate-300'}`}>
                <div className="flex justify-between items-start mb-4">
                  <div className="p-2.5 rounded-xl bg-emerald-100 text-emerald-600"><CheckCircle2 size={20} /></div>
                  <span className="text-3xl font-black text-slate-800">{countEnviados}</span>
                </div>
                <p className="text-sm font-semibold text-slate-600">Aguardando Data Teste</p>
                <p className="text-[11px] text-slate-400 mt-1">Amostras já em trânsito</p>
              </div>

              <div onClick={() => setActiveTab('Feedbacks')} className={`bg-white p-5 rounded-2xl shadow-sm border transition-all cursor-pointer group hover:-translate-y-1 ${activeTab === 'Feedbacks' ? 'border-purple-400 ring-2 ring-purple-400/20' : 'border-slate-100 hover:border-slate-300'}`}>
                <div className="flex justify-between items-start mb-4">
                  <div className={`p-2.5 rounded-xl ${countFeedbacks > 0 ? 'bg-purple-100 text-purple-600 animate-pulse' : 'bg-slate-100 text-slate-500'}`}>
                    <Mail size={20} />
                  </div>
                  <span className={`text-3xl font-black ${countFeedbacks > 0 ? 'text-purple-700' : 'text-slate-800'}`}>{countFeedbacks}</span>
                </div>
                <p className="text-sm font-semibold text-slate-600">Cobrar Feedbacks</p>
                <p className="text-[11px] text-slate-400 mt-1">Testes já realizados</p>
              </div>

              <div onClick={() => setActiveTab('Finalizados')} className={`bg-white p-5 rounded-2xl shadow-sm border transition-all cursor-pointer group hover:-translate-y-1 ${activeTab === 'Finalizados' ? 'border-blue-400 ring-2 ring-blue-400/20' : 'border-slate-100 hover:border-slate-300'}`}>
                <div className="flex justify-between items-start mb-4">
                  <div className="p-2.5 rounded-xl bg-blue-100 text-blue-600"><Layers size={20} /></div>
                  <span className="text-3xl font-black text-slate-800">
                    {ordersInSegment.filter(o => o.status === 'Finalizado' || o.status === 'Faturado').length}
                  </span>
                </div>
                <p className="text-sm font-semibold text-slate-600">Concluídos</p>
                <p className="text-[11px] text-slate-400 mt-1">Histórico faturado/finalizado</p>
              </div>
            </div>

            {/* TABELA DE PEDIDOS */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
              {/* Abas Internas da Tabela */}
              <div className="flex border-b border-slate-100 px-6 bg-white overflow-x-auto gap-6 pt-2">
                {['Todos', 'Pendentes', 'Aguardando Teste', 'Feedbacks', 'Finalizados'].map((tab) => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`py-4 text-sm font-bold border-b-2 transition-colors whitespace-nowrap relative ${
                      activeTab === tab 
                        ? 'border-blue-600 text-blue-700' 
                        : 'border-transparent text-slate-400 hover:text-slate-700'
                    }`}
                  >
                    {tab}
                    {tab === 'Feedbacks' && countFeedbacks > 0 && (
                      <span className="absolute top-3 -right-4 flex h-2 w-2">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span>
                      </span>
                    )}
                  </button>
                ))}
              </div>

              {/* Tabela */}
              <div className="overflow-x-auto min-h-[400px]">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead className="bg-slate-50/50 border-b border-slate-100 text-slate-400 uppercase text-[10px] tracking-wider font-semibold">
                    <tr>
                      <th className="px-6 py-4">Pedido / Empresa</th>
                      <th className="px-6 py-4">Datas</th>
                      <th className="px-6 py-4">Produto & Detalhes</th>
                      <th className="px-6 py-4">Status</th>
                      <th className="px-6 py-4 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50">
                    {filteredOrders.map((order) => (
                      <tr key={order.id} className="hover:bg-slate-50 transition-colors bg-white group">
                        <td className="px-6 py-4">
                          <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold border border-slate-200">
                              {order.razaoSocial ? order.razaoSocial.charAt(0).toUpperCase() : <Building2 size={16}/>}
                            </div>
                            <div>
                              <div className="font-bold text-slate-800 text-sm tracking-tight">{order.pedido}</div>
                              <div className="text-slate-500 text-xs mt-0.5 truncate max-w-[180px]">{order.razaoSocial}</div>
                              <div className="text-slate-400 text-[10px] mt-1 flex items-center gap-1 uppercase tracking-wider font-semibold">
                                <UserCircle size={10}/> {order.vendedor}
                              </div>
                            </div>
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          <div className="flex flex-col gap-2">
                            <div className="flex items-center gap-2 text-xs">
                              <span className="text-slate-400 w-12 text-right">Envio:</span>
                              <span className="font-semibold text-slate-700 bg-slate-100 px-2 py-0.5 rounded text-[11px]">{order.dataNecessidade ? order.dataNecessidade.split('-').reverse().join('/') : '-'}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs">
                              <span className="text-slate-400 w-12 text-right">Teste:</span>
                              <span className="font-semibold text-slate-700 bg-slate-100 px-2 py-0.5 rounded text-[11px]">{order.dataTeste ? order.dataTeste.split('-').reverse().join('/') : '-'}</span>
                            </div>
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          <div className="font-semibold text-slate-800 flex items-center gap-2 text-[13px]">
                            <Package size={14} className="text-slate-400"/> 
                            {order.codigoProduto ? `${order.codigoProduto} - ${order.produto}` : order.produto}
                          </div>
                          <div className="text-slate-500 text-xs mt-1 max-w-[280px] truncate" title={order.descricao}>
                            <span className="font-bold text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded">{order.quantidade}</span> <span className="ml-1">{order.descricao}</span>
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          {getStatusBadge(order)}
                        </td>
                        <td className="px-6 py-4 text-right">
                          <div className="flex items-center justify-end gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-300">
                            {order.status === 'Pendente' && (
                              <button onClick={() => markAsSent(order.id)} disabled={isLoading} className="bg-white border border-emerald-200 hover:bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition-all shadow-sm">
                                <Send size={14} /> Enviar
                              </button>
                            )}
                            {isEmailDue(order) && (
                              <button onClick={() => setEmailModalData(order)} disabled={isLoading} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-md transition-all">
                                <Mail size={14} /> Cobrar
                              </button>
                            )}
                            {order.status === 'Enviado' && !isEmailDue(order) && (
                              <span className="text-[11px] font-medium text-slate-400 bg-slate-50 px-2 py-1 rounded border border-slate-100">
                                Aguardando Data
                              </span>
                            )}
                            {(order.status === 'Finalizado' || order.status === 'Faturado') && (
                              <span className="text-[11px] font-medium text-slate-400 px-2 py-1">Sem ações</span>
                            )}
                            <div className="w-px h-6 bg-slate-100 mx-1"></div>
                            <button onClick={() => setOrderToDelete(order)} disabled={isLoading} className="text-slate-400 hover:text-rose-600 hover:bg-rose-50 p-1.5 rounded-lg transition-colors" title="Excluir pedido">
                              <Trash2 size={16} />
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    {filteredOrders.length === 0 && !isLoading && (
                      <tr>
                        <td colSpan="5" className="px-6 py-20 text-center">
                          <div className="flex flex-col items-center justify-center text-slate-400">
                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-3">
                              <Search size={24} className="text-slate-300"/>
                            </div>
                            <p className="font-bold text-slate-600">Nenhum pedido encontrado.</p>
                            <p className="text-xs mt-1">Ajuste os filtros ou adicione novos na planilha.</p>
                          </div>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          {/* MODAL: ALERTA DIÁRIO */}
          {showDailyDigest && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
                <div className="bg-gradient-to-br from-purple-600 to-indigo-600 p-8 text-center relative">
                  <div className="w-16 h-16 bg-white/20 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <BellRing size={28} className="animate-bounce" />
                  </div>
                  <h2 className="text-2xl font-black text-white tracking-tight">Bom dia!</h2>
                  <p className="text-purple-100 text-sm mt-1">Existem pendências aguardando sua ação.</p>
                  <button onClick={() => setShowDailyDigest(false)} className="absolute top-4 right-4 text-white/50 hover:text-white transition-colors"><X size={20} /></button>
                </div>
                
                <div className="p-6 bg-white">
                  <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <Mail size={14} className="text-purple-500"/>
                    Para cobrar hoje ({countFeedbacks})
                  </h3>
                  
                  <div className="space-y-3 max-h-[250px] overflow-y-auto custom-scrollbar pr-2">
                    {feedbacksPendentesData.map(order => (
                      <div key={`digest-${order.id}`} className="bg-slate-50 border border-slate-100 rounded-xl p-3 flex items-center justify-between hover:border-purple-200 transition-colors">
                        <div>
                          <p className="font-bold text-slate-800 text-sm">{order.pedido} <span className="font-normal text-slate-500">| {order.razaoSocial}</span></p>
                          <p className="text-[11px] text-slate-400 mt-1">Teste em: {order.dataTeste ? order.dataTeste.split('-').reverse().join('/') : ''}</p>
                        </div>
                        <button 
                          onClick={() => {
                            setShowDailyDigest(false);
                            setActiveTab('Feedbacks');
                            setEmailModalData(order);
                          }}
                          className="bg-white hover:bg-purple-50 text-purple-600 border border-purple-200 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all shadow-sm"
                        >
                          E-mail
                        </button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="p-4 bg-slate-50 border-t border-slate-100">
                  <button 
                    onClick={() => { setShowDailyDigest(false); setActiveTab('Feedbacks'); }} 
                    className="w-full py-3 rounded-xl text-sm font-bold text-slate-700 bg-white border border-slate-200 hover:bg-slate-100 transition-colors shadow-sm"
                  >
                    Ir para o Painel
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL: EMAIL */}
          {emailModalData && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-white">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"><Mail size={18} /></div>
                    <div>
                      <h2 className="text-lg font-bold text-slate-800">Nova Mensagem</h2>
                      <p className="text-[11px] text-slate-500">Geração automática de cobrança</p>
                    </div>
                  </div>
                  <button onClick={() => setEmailModalData(null)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors"><X size={20} /></button>
                </div>

                <div className="flex-1 overflow-hidden flex flex-col md:flex-row bg-slate-50/50">
                  {/* Lateral de Instruções */}
                  <div className="w-full md:w-1/3 bg-white p-6 border-r border-slate-100 overflow-y-auto">
                    <div className="space-y-4 text-[13px] text-slate-600">
                      <div><strong className="block text-slate-800 text-[11px] uppercase tracking-wider mb-1">Assunto</strong><div className="p-2.5 bg-slate-50 border border-slate-200 rounded-lg select-all text-slate-700 font-medium">Acompanhamento de Teste - Pedido {emailModalData.pedido} - {emailModalData.razaoSocial}</div></div>
                      <div><strong className="block text-slate-800 text-[11px] uppercase tracking-wider mb-1">Para</strong><div className="p-2.5 bg-slate-50 border border-slate-200 rounded-lg select-all text-blue-600 font-medium">{emailModalData.emailVendedor}</div></div>
                      <div><strong className="block text-slate-800 text-[11px] uppercase tracking-wider mb-1">Cópia (CC)</strong><div className="p-2.5 bg-slate-50 border border-slate-200 rounded-lg select-all text-purple-600 font-medium leading-relaxed">{EMAILS_COPIA_FIXA.join(';\n')};<br/>{emailModalData.emailGerente};<br/>{emailModalData.emailDiretor};<br/>{emailModalData.emailAtendente}</div></div>
                      
                      <div className="pt-4 mt-6 border-t border-slate-100">
                        <button onClick={() => markAsFinished(emailModalData.id)} disabled={isLoading} className="w-full py-3 rounded-xl text-sm font-bold text-white bg-slate-800 hover:bg-slate-900 transition-colors shadow-sm flex items-center justify-center gap-2">
                          <CheckCircle2 size={16}/> Encerrar Pendência
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Corpo do Email */}
                  <div className="w-full md:w-2/3 p-8 overflow-y-auto relative bg-slate-50/50">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 relative min-h-full">
                      {/* BARRA DE AÇÕES DO EMAIL */}
                      <div className="absolute top-4 right-4 flex gap-2">
                        {/* BOTÃO ATUALIZADO: DISPARAR DIRECTAMENTE NO GMAIL */}
                        <button onClick={() => handleOpenGmail(emailModalData)}
                          className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-all shadow-sm"
                          title="Abre o seu Gmail em uma nova aba preenchendo todos os campos"
                        >
                          <ExternalLink size={14} /> Abrir no Gmail
                        </button>

                        <button onClick={() => {
                            const emailDiv = document.getElementById('email-content');
                            const range = document.createRange();
                            range.selectNodeContents(emailDiv);
                            const sel = window.getSelection();
                            sel.removeAllRanges();
                            sel.addRange(range);
                            try { document.execCommand('copy'); setIsCopied(true); setTimeout(() => setIsCopied(false), 3000); } 
                            catch (err) { alert('Erro ao copiar. Selecione e aperte Ctrl+C.'); }
                            sel.removeAllRanges();
                          }}
                          className={`px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-all shadow-sm border ${isCopied ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-white hover:bg-slate-50 text-slate-600 border-slate-200'}`}
                        >
                          {isCopied ? <><CheckCircle2 size={14} /> Copiado!</> : <><Copy size={14} /> Copiar com Design</>}
                        </button>
                      </div>

                      <div id="email-content" className="font-sans text-[14px] text-slate-800 leading-relaxed max-w-xl mt-12">
                        <p>Prezado(a) <strong>{emailModalData.vendedor}</strong>,</p>
                        <br/>
                        <p>Esperamos que este e-mail o(a) encontre bem.</p>
                        <p>Entramos em contato referente à antecipação da amostra solicitada sob o <strong>Pedido {emailModalData.pedido}</strong> para o cliente <strong>{emailModalData.razaoSocial}</strong>.</p>
                        <p>Conforme nossos registros, a amostra do produto <strong>{emailModalData.codigoProduto ? `${emailModalData.codigoProduto} - ` : ''}{emailModalData.produto}</strong> (Qtde: {emailModalData.quantidade}) tinha um teste agendado para <strong>{emailModalData.dataTeste ? emailModalData.dataTeste.split('-').reverse().join('/') : ''}</strong>.</p>
                        <br/>
                        <p>Para garantir a eficácia das nossas soluções, solicitamos um feedback sobre este teste:</p>
                        <ul className="list-disc pl-6 my-4 space-y-1.5 text-slate-700">
                          <li>O teste foi realizado conforme o previsto?</li>
                          <li>Como foi a performance do produto durante a aplicação?</li>
                          <li>Houve aprovação técnica por parte do cliente?</li>
                          <li>Quais são os próximos passos ou previsão para negócios decorrentes desta amostra?</li>
                        </ul>
                        <p>O seu retorno é fundamental para alinhamento com a gerência e diretoria.</p>
                        <br />
                        <p>Atenciosamente,</p>
                        <p className="font-bold text-gray-900 mt-4">{emailModalData.atendente}<br/><span className="text-slate-500 font-normal text-xs">Setor de Amostras</span></p>
                        <div className="mt-8 pt-6 border-t border-slate-100"><img src="https://i.postimg.cc/J0G8jfMQ/as-02-(2).png" alt="Logo Doremus" style={{ maxHeight: '50px', objectFit: 'contain' }} /></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL: DELETE */}
          {orderToDelete && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                <div className="p-6 text-center pt-8">
                  <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><Trash2 size={28} /></div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">Excluir Registro</h3>
                  <p className="text-sm text-slate-500 px-4">Esta ação removerá o pedido <strong>{orderToDelete.pedido}</strong> permanentemente da base.</p>
                </div>
                <div className="p-4 bg-slate-50 flex gap-3">
                  <button onClick={() => setOrderToDelete(null)} disabled={isLoading} className="flex-1 py-3 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition-colors shadow-sm">Cancelar</button>
                  <button onClick={() => handleDeleteOrder(orderToDelete.id)} disabled={isLoading} className="flex-1 py-3 rounded-xl text-sm font-bold text-white bg-rose-600 hover:bg-rose-700 transition-colors shadow-sm">Confirmar</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
