<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Amostras - Doremus</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Maps para carregar o React e Ícones no navegador -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.2.0"
      }
    }
  </script>
  
  <!-- Babel (Tradutor de JSX para o Navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <!-- Script principal em React -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Calendar, Clock, CheckCircle2, AlertCircle, Mail, Plus, Search, 
      X, Send, Building2, Package, UserCircle, Copy, Filter, Layers, Trash2, BellRing, Loader2
    } from 'lucide-react';
    
    // =========================================================================
    // COLE AQUI A URL DO GOOGLE APPS SCRIPT GERADA (APP DA WEB)
    // =========================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ7N3abnyhUZginfgjoA3_H1Ur5PGwSswNeXyt9R_X1zaudevD-5mmvrjny2ryAg/exec"; 

    // --- CONSTANTES ---
    const SEGMENTOS = [
      'CÁRNEOS',
      'EXPORTACAO',
      'FARMA',
      'FOOD SERVICE',
      'LACTEOS',
      'NUTRICAO ANIMAL',
      'NUTRICAO ESPORTIVA',
      'PANIFICACAO',
      'SMB',
      'SORVETES'
    ];

    const EMAILS_COPIA_FIXA = [
      'thamiris.bezerra@doremus.com.br',
      'paula.novais@doremus.com.br'
    ];

    const getToday = () => {
      const d = new Date();
      d.setHours(0,0,0,0);
      return d;
    };

    function App() {
      const [orders, setOrders] = useState([]);
      const [isLoading, setIsLoading] = useState(true); // Controle de Loading da Planilha
      const [searchTerm, setSearchTerm] = useState('');
      const [activeTab, setActiveTab] = useState('Todos');
      const [selectedSegment, setSelectedSegment] = useState('Todos');
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [emailModalData, setEmailModalData] = useState(null);
      const [orderToDelete, setOrderToDelete] = useState(null);
      const [isCopied, setIsCopied] = useState(false);
      
      const [showDailyDigest, setShowDailyDigest] = useState(false);
      const [hasSeenDigestThisSession, setHasSeenDigestThisSession] = useState(false);

      // --- COMUNICAÇÃO COM O GOOGLE SHEETS ---
      const fetchOrders = async () => {
        setIsLoading(true);
        try {
          if(SCRIPT_URL === "SUA_URL_AQUI") {
            console.warn("Aviso: SCRIPT_URL não foi configurado.");
            setIsLoading(false);
            return;
          }
          const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
          const data = await response.json();
          
          // Ordena garantindo os mais recentes primeiro
          data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setOrders(data);

          // Disparo de Alerta Diário
          const pendingFeedbacks = data.filter(o => isEmailDue(o));
          if (pendingFeedbacks.length > 0 && !hasSeenDigestThisSession) {
            setShowDailyDigest(true);
            setHasSeenDigestThisSession(true);
          }
        } catch (error) {
          console.error("Erro ao ler da planilha:", error);
          alert("Não foi possível carregar os dados. Verifique a conexão com a Planilha.");
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchOrders();
      }, []);

      // Cálculo de Atraso de Email
      const getDaysDifference = (targetDateStr) => {
        const targetDate = new Date(`${targetDateStr}T00:00:00`);
        const diffTime = targetDate - getToday();
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      };

      const isEmailDue = (order) => {
        if (order.status === 'Finalizado') return false;
        const daysSinceTest = getDaysDifference(order.dataTeste) * -1;
        return daysSinceTest >= 1 && order.status === 'Enviado';
      };

      const [formData, setFormData] = useState({
        pedido: '', razaoSocial: '', segmento: '', dataNecessidade: '', dataTeste: '',
        vendedor: '', emailVendedor: '', gerente: '', emailGerente: '', 
        diretor: '', emailDiretor: '', atendente: '', emailAtendente: '',
        codigoProduto: '', produto: '', descricao: '', quantidade: ''
      });

      const allSegments = ['Todos', ...SEGMENTOS];

      const getRowIndicatorColor = (order) => {
        if (order.status === 'Enviado' || order.status === 'Finalizado') return 'border-l-green-500';
        const daysToNeed = getDaysDifference(order.dataNecessidade);
        if (daysToNeed < 0) return 'border-l-red-500';
        if (daysToNeed <= 3) return 'border-l-orange-500';
        return 'border-l-blue-500';
      };

      const getStatusBadge = (order) => {
        if (order.status === 'Enviado') return <span className="px-2.5 py-1 bg-green-100 text-green-700 text-xs font-bold rounded flex items-center gap-1 w-max"><CheckCircle2 size={14}/> Enviado</span>;
        if (order.status === 'Finalizado') return <span className="px-2.5 py-1 bg-slate-200 text-slate-700 text-xs font-bold rounded w-max">Finalizado</span>;

        const daysToNeed = getDaysDifference(order.dataNecessidade);
        if (daysToNeed < 0) return <span className="px-2.5 py-1 bg-red-100 text-red-700 text-xs font-bold rounded flex items-center gap-1 w-max"><AlertCircle size={14}/> Atrasado</span>;
        if (daysToNeed <= 3) return <span className="px-2.5 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded flex items-center gap-1 w-max"><Clock size={14}/> Urgente</span>;
        
        return <span className="px-2.5 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded flex items-center gap-1 w-max"><Calendar size={14}/> No Prazo</span>;
      };

      // Ações via POST para a Planilha
      const handleAddOrder = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setIsAddModalOpen(false);

        const newOrder = {
          ...formData, 
          id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(), // ID Único
          status: 'Pendente', 
          createdAt: new Date().toISOString()
        };

        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'addOrder', data: newOrder })
          });
          
          setFormData({ 
            pedido: '', razaoSocial: '', segmento: '', dataNecessidade: '', dataTeste: '', 
            vendedor: '', emailVendedor: '', gerente: '', emailGerente: '', 
            diretor: '', emailDiretor: '', atendente: '', emailAtendente: '', 
            codigoProduto: '', produto: '', descricao: '', quantidade: '' 
          });
          
          fetchOrders(); // Recarrega
        } catch (error) {
          console.error("Erro", error);
          setIsLoading(false);
        }
      };

      const markAsSent = async (id) => {
        setIsLoading(true);
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', id, status: 'Enviado' })
        });
        fetchOrders();
      };

      const markAsFinished = async (id) => {
        setIsLoading(true);
        setEmailModalData(null);
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', id, status: 'Finalizado' })
        });
        fetchOrders();
      };

      const handleDeleteOrder = async (id) => {
        setIsLoading(true);
        setOrderToDelete(null);
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'deleteOrder', id })
        });
        fetchOrders();
      };

      const filteredOrders = orders.filter(o => {
        const matchesSearch = o.razaoSocial?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              o.pedido?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              o.vendedor?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              (o.codigoProduto && o.codigoProduto.toLowerCase().includes(searchTerm.toLowerCase()));
        
        let matchesTab = true;
        if (activeTab === 'Pendentes') matchesTab = o.status === 'Pendente';
        if (activeTab === 'Aguardando Teste') matchesTab = o.status === 'Enviado' && !isEmailDue(o);
        if (activeTab === 'Feedbacks') matchesTab = isEmailDue(o);
        if (activeTab === 'Finalizados') matchesTab = o.status === 'Finalizado';
        const matchesSegment = selectedSegment === 'Todos' || o.segmento === selectedSegment;

        return matchesSearch && matchesTab && matchesSegment;
      });

      const ordersInSegment = selectedSegment === 'Todos' ? orders : orders.filter(o => o.segmento === selectedSegment);
      const countPendentes = ordersInSegment.filter(o => o.status === 'Pendente').length;
      const countUrgentes = ordersInSegment.filter(o => o.status === 'Pendente' && getDaysDifference(o.dataNecessidade) <= 3).length;
      const countEnviados = ordersInSegment.filter(o => o.status === 'Enviado' && !isEmailDue(o)).length;
      
      const feedbacksPendentesData = ordersInSegment.filter(o => isEmailDue(o));
      const countFeedbacks = feedbacksPendentesData.length;

      return (
        <div className="min-h-screen bg-slate-100 font-sans text-slate-800 pb-12 relative">
          
          {/* OVERLAY DE LOADING */}
          {isLoading && (
            <div className="fixed inset-0 bg-white/70 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
              <Loader2 size={48} className="text-blue-600 animate-spin mb-4" />
              <p className="text-lg font-bold text-slate-700">Sincronizando com a Planilha...</p>
              <p className="text-sm text-slate-500">Aguarde alguns segundos.</p>
            </div>
          )}

          {/* HEADER */}
          <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <img src="https://i.postimg.cc/J0G8jfMQ/as-02-(2).png" alt="Logo" className="h-10 object-contain" />
                <div className="h-8 w-px bg-slate-200 mx-2"></div>
                <div>
                  <h1 className="text-xl font-bold text-slate-800 tracking-tight">Painel de Antecipações</h1>
                  <p className="text-xs text-slate-500 font-medium">Sincronizado com Google Sheets</p>
                </div>
              </div>
              <div className="flex gap-4">
                <div className="relative flex items-center border border-slate-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 transition-all bg-white">
                  <div className="pl-3 py-2 text-slate-400 bg-slate-50 border-r border-slate-300">
                    <Layers size={18} />
                  </div>
                  <select 
                    value={selectedSegment}
                    onChange={(e) => setSelectedSegment(e.target.value)}
                    className="pl-2 pr-8 py-2 text-sm focus:outline-none bg-transparent font-medium text-slate-700 cursor-pointer"
                  >
                    {allSegments.map(seg => <option key={seg} value={seg}>{seg}</option>)}
                  </select>
                </div>

                <div className="relative">
                  <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                  <input 
                    type="text" 
                    placeholder="Buscar pedido, cliente, código..." 
                    className="pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-64 transition-all"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
                <button 
                  onClick={() => fetchOrders()}
                  className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold flex items-center shadow-sm transition-colors"
                  title="Forçar Atualização"
                >
                  Atualizar Dados
                </button>
                <button 
                  onClick={() => setIsAddModalOpen(true)}
                  className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-sm transition-colors"
                >
                  <Plus size={18} /> Novo Pedido
                </button>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {SCRIPT_URL === "SUA_URL_AQUI" && !isLoading && (
              <div className="mb-6 p-4 bg-red-100 border border-red-300 text-red-800 rounded-xl flex items-center gap-3">
                <AlertCircle />
                <p><strong>Atenção:</strong> Você precisa colocar a URL gerada pelo Google Apps Script no código (linha ~45 onde diz <code>SCRIPT_URL</code>).</p>
              </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
              <div onClick={() => setActiveTab('Pendentes')} className={`bg-white p-5 rounded-xl border shadow-sm flex items-center gap-4 cursor-pointer transition-all hover:shadow-md ${activeTab === 'Pendentes' ? 'border-blue-500 ring-1 ring-blue-500' : 'border-slate-200'}`}>
                <div className="bg-blue-50 p-3 rounded-lg text-blue-600"><Package size={24} /></div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">Pendentes (Envio)</p>
                  <p className="text-2xl font-bold text-slate-800">{countPendentes}</p>
                </div>
              </div>

              <div onClick={() => setActiveTab('Pendentes')} className={`bg-white p-5 rounded-xl border shadow-sm flex items-center gap-4 cursor-pointer transition-all hover:shadow-md ${activeTab === 'Pendentes' ? 'border-orange-500 ring-1 ring-orange-500' : 'border-slate-200'}`}>
                <div className="bg-orange-50 p-3 rounded-lg text-orange-600"><Clock size={24} /></div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">Urgentes / Atrasados</p>
                  <p className="text-2xl font-bold text-slate-800">{countUrgentes}</p>
                </div>
              </div>

              <div onClick={() => setActiveTab('Aguardando Teste')} className={`bg-white p-5 rounded-xl border shadow-sm flex items-center gap-4 cursor-pointer transition-all hover:shadow-md ${activeTab === 'Aguardando Teste' ? 'border-green-500 ring-1 ring-green-500' : 'border-slate-200'}`}>
                <div className="bg-green-50 p-3 rounded-lg text-green-600"><CheckCircle2 size={24} /></div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">Aguardando Teste</p>
                  <p className="text-2xl font-bold text-slate-800">{countEnviados}</p>
                </div>
              </div>

              <div onClick={() => setActiveTab('Feedbacks')} className={`bg-white p-5 rounded-xl border shadow-sm flex items-center gap-4 cursor-pointer transition-all hover:shadow-md ${activeTab === 'Feedbacks' ? 'border-purple-500 ring-1 ring-purple-500' : 'border-slate-200'}`}>
                <div className="bg-purple-50 p-3 rounded-lg text-purple-600"><Mail size={24} /></div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">Cobrar Feedbacks</p>
                  <p className="text-2xl font-bold text-purple-700">{countFeedbacks}</p>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
              <div className="flex border-b border-slate-200 px-4 bg-slate-50 overflow-x-auto">
                {['Todos', 'Pendentes', 'Aguardando Teste', 'Feedbacks', 'Finalizados'].map((tab) => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`py-4 px-6 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap ${
                      activeTab === tab 
                        ? 'border-blue-600 text-blue-700 bg-blue-50/50' 
                        : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'
                    }`}
                  >
                    {tab}
                    {tab === 'Feedbacks' && countFeedbacks > 0 && (
                      <span className="ml-2 bg-purple-100 text-purple-700 py-0.5 px-2 rounded-full text-xs">{countFeedbacks}</span>
                    )}
                  </button>
                ))}
              </div>

              <div className="overflow-x-auto min-h-[300px]">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead className="bg-white border-b border-slate-200 text-slate-500 uppercase text-[11px] tracking-wider">
                    <tr>
                      <th className="px-6 py-4 font-bold">Pedido / Cliente</th>
                      <th className="px-6 py-4 font-bold">Datas (Necessidade / Teste)</th>
                      <th className="px-6 py-4 font-bold">Produto / Detalhes</th>
                      <th className="px-6 py-4 font-bold">Status</th>
                      <th className="px-6 py-4 font-bold text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {filteredOrders.map((order) => (
                      <tr key={order.id} className={`hover:bg-slate-50 transition-colors bg-white relative border-l-4 ${getRowIndicatorColor(order)}`}>
                        <td className="px-6 py-4">
                          <div className="font-bold text-slate-800 text-sm">{order.pedido}</div>
                          <div className="text-slate-500 text-xs mt-1 flex items-center gap-1">
                            <Building2 size={12} className="text-slate-400"/> {order.razaoSocial}
                          </div>
                          {order.segmento && (
                            <div className="mt-1">
                              <span className="bg-slate-100 text-slate-600 border border-slate-200 py-0.5 px-2 rounded-[4px] text-[10px] font-semibold uppercase tracking-wider">
                                {order.segmento}
                              </span>
                            </div>
                          )}
                          <div className="text-slate-500 text-xs mt-2 flex items-center gap-1">
                            <UserCircle size={12} className="text-slate-400"/> Vend: {order.vendedor}
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-2 text-xs">
                              <span className="text-slate-400 w-16">Envio:</span>
                              <span className="font-medium text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{order.dataNecessidade ? order.dataNecessidade.split('-').reverse().join('/') : ''}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs">
                              <span className="text-slate-400 w-16">Teste:</span>
                              <span className="font-medium text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{order.dataTeste ? order.dataTeste.split('-').reverse().join('/') : ''}</span>
                            </div>
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          <div className="font-medium text-slate-800 flex items-center gap-2">
                            <Package size={14} className="text-blue-500"/> 
                            {order.codigoProduto ? `${order.codigoProduto} - ${order.produto}` : order.produto}
                          </div>
                          <div className="text-slate-500 text-xs mt-1 max-w-[250px] truncate" title={order.descricao}>
                            <span className="font-bold text-slate-600">{order.quantidade}</span> - {order.descricao}
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          {getStatusBadge(order)}
                        </td>
                        <td className="px-6 py-4 text-right">
                          <div className="flex items-center justify-end gap-2">
                            {order.status === 'Pendente' && (
                              <button onClick={() => markAsSent(order.id)} disabled={isLoading} className="bg-white border border-slate-300 hover:border-green-500 hover:text-green-600 hover:bg-green-50 text-slate-700 px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-1 transition-all shadow-sm">
                                <Send size={14} /> Enviar Amostra
                              </button>
                            )}
                            {isEmailDue(order) && (
                              <button onClick={() => setEmailModalData(order)} disabled={isLoading} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded-md text-xs font-bold flex items-center gap-1 shadow-md transition-all animate-pulse hover:animate-none ring-2 ring-purple-600 ring-offset-2 ring-offset-white">
                                <Mail size={14} /> Cobrar Feedback
                              </button>
                            )}
                            {order.status === 'Enviado' && !isEmailDue(order) && (
                              <span className="text-xs font-medium text-slate-400 flex items-center justify-end gap-1">
                                <Clock size={12}/> Aguardando data
                              </span>
                            )}
                            <div className="w-px h-6 bg-slate-200 mx-1"></div>
                            <button onClick={() => setOrderToDelete(order)} disabled={isLoading} className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-md transition-colors" title="Excluir pedido">
                              <Trash2 size={16} />
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    {filteredOrders.length === 0 && !isLoading && (
                      <tr>
                        <td colSpan="5" className="px-6 py-12 text-center">
                          <div className="flex flex-col items-center justify-center text-slate-400">
                            <Filter size={32} className="mb-2 opacity-50"/>
                            <p className="font-medium text-slate-600">Nenhum pedido nesta categoria.</p>
                          </div>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          {/* NOVO: MODAL DE ALERTA DIÁRIO */}
          {showDailyDigest && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
                <div className="bg-purple-600 p-6 text-center relative">
                  <div className="w-16 h-16 bg-white/20 text-white rounded-full flex items-center justify-center mx-auto mb-3">
                    <BellRing size={32} className="animate-pulse" />
                  </div>
                  <h2 className="text-2xl font-bold text-white mb-1">Resumo do Dia</h2>
                  <p className="text-purple-100 text-sm">Você tem pendências que exigem sua atenção hoje.</p>
                  <button onClick={() => setShowDailyDigest(false)} className="absolute top-4 right-4 text-white/70 hover:text-white transition-colors">
                    <X size={24} />
                  </button>
                </div>
                
                <div className="p-6 bg-slate-50 border-b border-slate-100">
                  <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <Mail size={16} className="text-purple-600"/>
                    Feedbacks para Cobrar ({countFeedbacks})
                  </h3>
                  
                  <div className="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                    {feedbacksPendentesData.map(order => (
                      <div key={`digest-${order.id}`} className="bg-white border border-slate-200 rounded-lg p-3 flex items-center justify-between shadow-sm">
                        <div>
                          <p className="font-bold text-slate-800 text-sm">{order.pedido} - <span className="font-medium">{order.razaoSocial}</span></p>
                          <p className="text-xs text-slate-500 mt-0.5">Teste feito em: {order.dataTeste ? order.dataTeste.split('-').reverse().join('/') : ''}</p>
                        </div>
                        <button 
                          onClick={() => {
                            setShowDailyDigest(false);
                            setActiveTab('Feedbacks');
                            setEmailModalData(order);
                          }}
                          className="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 rounded text-xs font-bold transition-colors"
                        >
                          Gerar E-mail
                        </button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="p-5 flex justify-center bg-white">
                  <button 
                    onClick={() => {
                      setShowDailyDigest(false);
                      setActiveTab('Feedbacks');
                    }} 
                    className="px-6 py-2.5 rounded-lg text-sm font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors w-full"
                  >
                    Fechar e Ver Painel Completo
                  </button>
                </div>
              </div>
            </div>
          )}

          {isAddModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="flex items-center justify-between p-6 border-b border-slate-100 bg-slate-50">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Plus size={20} className="text-blue-600" /> Nova Antecipação</h2>
                  <button onClick={() => setIsAddModalOpen(false)} disabled={isLoading} className="text-slate-400 hover:text-slate-600 p-1 rounded-md hover:bg-slate-200"><X size={20} /></button>
                </div>
                <div className="p-6 overflow-y-auto custom-scrollbar">
                  <form id="add-order-form" onSubmit={handleAddOrder} className="space-y-6">
                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase border-b border-slate-100 pb-2">Informações do Pedido</h3>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Número do Pedido</label><input required type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={formData.pedido} onChange={e => setFormData({...formData, pedido: e.target.value})} /></div>
                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Razão Social</label><input required type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={formData.razaoSocial} onChange={e => setFormData({...formData, razaoSocial: e.target.value})} /></div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Segmento</label>
                          <select required className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white" value={formData.segmento} onChange={e => setFormData({...formData, segmento: e.target.value})}>
                            <option value="" disabled>Selecione um segmento...</option>
                            {SEGMENTOS.map(seg => <option key={seg} value={seg}>{seg}</option>)}
                          </select>
                        </div>
                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Data da Necessidade</label><input required type="date" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={formData.dataNecessidade} onChange={e => setFormData({...formData, dataNecessidade: e.target.value})} /></div>
                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Data do Teste</label><input required type="date" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={formData.dataTeste} onChange={e => setFormData({...formData, dataTeste: e.target.value})} /></div>
                      </div>
                    </div>
                    
                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase border-b border-slate-100 pb-2">Detalhes da Amostra</h3>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Código do Produto</label><input required type="text" placeholder="Ex: PT-1234" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" value={formData.codigoProduto} onChange={e => setFormData({...formData, codigoProduto: e.target.value})} /></div>
                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Nome do Produto</label><input required type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" value={formData.produto} onChange={e => setFormData({...formData, produto: e.target.value})} /></div>
                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Qtd / Unidade</label><input required type="text" placeholder="Ex: 0,040g ou 10kg" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" value={formData.quantidade} onChange={e => setFormData({...formData, quantidade: e.target.value})} /></div>
                        <div className="md:col-span-4"><label className="block text-sm font-medium text-slate-700 mb-1">Descrição / Finalidade</label><textarea required rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 resize-none" value={formData.descricao} onChange={e => setFormData({...formData, descricao: e.target.value})}></textarea></div>
                      </div>
                    </div>

                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase border-b border-slate-100 pb-2">Equipe Envolvida</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 space-y-3">
                          <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Vendedor</label><input required type="text" placeholder="Nome" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.vendedor} onChange={e => setFormData({...formData, vendedor: e.target.value})} /></div>
                          <div><input required type="email" placeholder="E-mail" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.emailVendedor} onChange={e => setFormData({...formData, emailVendedor: e.target.value})} /></div>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 space-y-3">
                          <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Atendente (Amostras)</label><input required type="text" placeholder="Nome" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.atendente} onChange={e => setFormData({...formData, atendente: e.target.value})} /></div>
                          <div><input required type="email" placeholder="E-mail" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.emailAtendente} onChange={e => setFormData({...formData, emailAtendente: e.target.value})} /></div>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 space-y-3">
                          <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Gerente do Segmento</label><input required type="text" placeholder="Nome" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.gerente} onChange={e => setFormData({...formData, gerente: e.target.value})} /></div>
                          <div><input required type="email" placeholder="E-mail" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.emailGerente} onChange={e => setFormData({...formData, emailGerente: e.target.value})} /></div>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 space-y-3">
                          <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Diretor Responsável</label><input required type="text" placeholder="Nome" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.diretor} onChange={e => setFormData({...formData, diretor: e.target.value})} /></div>
                          <div><input required type="email" placeholder="E-mail" className="w-full border border-slate-300 rounded-md px-3 py-1.5 text-sm" value={formData.emailDiretor} onChange={e => setFormData({...formData, emailDiretor: e.target.value})} /></div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <div className="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                  <button onClick={() => setIsAddModalOpen(false)} disabled={isLoading} className="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-700 bg-white border border-slate-300 hover:bg-slate-50">Cancelar</button>
                  <button form="add-order-form" type="submit" disabled={isLoading} className="px-5 py-2.5 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 flex items-center gap-2"><CheckCircle2 size={18} /> Salvar Pedido</button>
                </div>
              </div>
            </div>
          )}

          {emailModalData && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[95vh]">
                <div className="flex items-center justify-between p-6 border-b border-slate-100 bg-slate-800 text-white">
                  <h2 className="text-xl font-bold flex items-center gap-2"><Mail size={20} className="text-purple-400" /> Gerador de E-mail de Feedback</h2>
                  <button onClick={() => setEmailModalData(null)} disabled={isLoading} className="text-slate-400 hover:text-white p-1 rounded-md"><X size={20} /></button>
                </div>
                <div className="flex-1 overflow-hidden flex flex-col md:flex-row">
                  <div className="w-full md:w-1/3 bg-slate-50 p-6 border-r border-slate-200 overflow-y-auto">
                    <h3 className="font-bold text-slate-800 mb-4 uppercase text-sm tracking-wider">Instruções</h3>
                    <div className="space-y-4 text-sm text-slate-600">
                      <div><strong className="block text-slate-800">Assunto:</strong><div className="mt-1 p-2 bg-white border border-slate-200 rounded text-xs select-all">Acompanhamento de Teste - Pedido {emailModalData.pedido} - {emailModalData.razaoSocial}</div></div>
                      <div><strong className="block text-slate-800">Para:</strong><div className="mt-1 p-2 bg-white border border-slate-200 rounded text-xs font-medium text-blue-700 select-all">{emailModalData.emailVendedor}</div></div>
                      <div>
                        <strong className="block text-slate-800">Cópia Fixa (Sempre em CC):</strong>
                        <div className="mt-1 p-2 bg-white border border-slate-200 rounded text-xs font-medium text-purple-700">
                          {EMAILS_COPIA_FIXA.join(';\n')}
                        </div>
                      </div>
                      <div>
                        <strong className="block text-slate-800">Outros Envolvidos (CC):</strong>
                        <div className="mt-1 p-2 bg-white border border-slate-200 rounded text-xs font-medium text-blue-700 select-all">
                          {emailModalData.emailGerente};<br/>{emailModalData.emailDiretor};<br/>{emailModalData.emailAtendente}
                        </div>
                      </div>
                      <div className="mt-6 p-4 bg-purple-50 border border-purple-200 rounded-lg text-purple-800">
                        <p className="font-semibold mb-2 flex items-center gap-1"><AlertCircle size={16}/> Envio em 1 Clique</p>
                        <p className="text-xs">O botão "Copiar E-mail" agora clona o design perfeitamente com a Logo para colar no Outlook/Gmail.</p>
                      </div>
                      <button onClick={() => markAsFinished(emailModalData.id)} disabled={isLoading} className="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white px-4 py-3 rounded-lg text-sm font-semibold flex justify-center items-center gap-2"><CheckCircle2 size={18}/> Marcar como Finalizado</button>
                    </div>
                  </div>
                  <div className="w-full md:w-2/3 p-8 overflow-y-auto bg-white relative">
                    <button onClick={() => {
                        const emailDiv = document.getElementById('email-content');
                        const range = document.createRange();
                        range.selectNodeContents(emailDiv);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                        try {
                          document.execCommand('copy');
                          setIsCopied(true);
                          setTimeout(() => setIsCopied(false), 3000);
                        } catch (err) {
                          alert('Erro ao copiar automaticamente. Selecione e aperte Ctrl+C.');
                        }
                        sel.removeAllRanges();
                      }}
                      className={`absolute top-4 right-4 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-1 transition-colors ${isCopied ? 'bg-green-100 text-green-700' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}
                    >
                      {isCopied ? <><CheckCircle2 size={14} /> Copiado com Design!</> : <><Copy size={14} /> Copiar E-mail</>}
                    </button>
                    <div id="email-content" className="font-sans text-[15px] text-gray-800 leading-relaxed max-w-2xl">
                      <p>Prezado(a) <strong>{emailModalData.vendedor}</strong>,</p>
                      <p>Esperamos que este e-mail o(a) encontre bem.</p>
                      <p>Entramos em contato referente à antecipação da amostra solicitada sob o <strong>Pedido {emailModalData.pedido}</strong> para o cliente <strong>{emailModalData.razaoSocial}</strong>.</p>
                      <p>Conforme nossos registros, a amostra do produto <strong>{emailModalData.codigoProduto ? `${emailModalData.codigoProduto} - ` : ''}{emailModalData.produto}</strong> (Quantidade: {emailModalData.quantidade}) tinha um teste agendado para a data de <strong>{emailModalData.dataTeste ? emailModalData.dataTeste.split('-').reverse().join('/') : ''}</strong>.</p>
                      <p>Para garantir a eficácia das nossas soluções, solicitamos gentilmente um feedback detalhado sobre este teste. Informações essenciais incluem:</p>
                      <ul className="list-disc pl-6 mb-4 space-y-2">
                        <li>O teste foi realizado conforme o previsto?</li>
                        <li>Como foi a performance do nosso produto durante a aplicação?</li>
                        <li>Houve aprovação técnica por parte do cliente?</li>
                        <li>Quais são os próximos passos ou previsão para negócios decorrentes desta amostra?</li>
                      </ul>
                      <p>Agradecemos antecipadamente pela sua colaboração. O seu retorno é fundamental para alinhamento com a gerência e diretoria.</p>
                      <br />
                      <p>Atenciosamente,</p>
                      <p className="font-bold text-gray-900 mt-4">{emailModalData.atendente}<br/><span className="text-gray-500 font-normal text-sm">Setor de Amostras</span></p>
                      <div className="mt-6 pt-6 border-t border-gray-200"><img src="https://i.postimg.cc/J0G8jfMQ/as-02-(2).png" alt="Logo Doremus" style={{ maxHeight: '60px', objectFit: 'contain' }} /></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {orderToDelete && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
                <div className="p-6 text-center">
                  <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Trash2 size={32} /></div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">Excluir Pedido</h3>
                  <p className="text-sm text-slate-600">Tem certeza que deseja excluir o pedido <strong>{orderToDelete.pedido}</strong>? Esta ação não pode ser desfeita.</p>
                </div>
                <div className="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                  <button onClick={() => setOrderToDelete(null)} disabled={isLoading} className="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-700 bg-white border border-slate-300">Cancelar</button>
                  <button onClick={() => handleDeleteOrder(orderToDelete.id)} disabled={isLoading} className="px-5 py-2.5 rounded-lg text-sm font-bold text-white bg-red-600">Sim, Excluir</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
